name: Build ghcr.io/n3ary/gtfs-rt

# Builds apps/gtfs-rt/Containerfile and pushes the resulting image to
# GHCR. Tag scheme:
#   latest                 - main branch HEAD
#   sha-<12-hex>           - immutable, traceable to a commit
#   <semver>               - when a release tag is pushed (gtfs-rt-v1.0.0)
#
# Required secrets:
#   GHCR_TOKEN       - github PAT with packages:write scope for n3ary org.
#                      CI's default GITHUB_TOKEN does NOT inherit the
#                      packages:write permission on the n3ary org, so a
#                      PAT has to be wired in.
#   NPM_TOKEN        - GH Packages token for the @n3ary/* workspace deps
#                      (cluj adapter). Already used by daily.yml; reuse
#                      the same secret.

on:
  push:
    branches: [main]
    tags: ['gtfs-rt-v*']
    paths:
      - 'apps/gtfs-rt/**'
      - 'libs/spec/**'
      - 'apps/gtfs-static/**'
      - '.github/workflows/build-gtfs-rt.yml'
      - 'apps/gtfs-rt/Containerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildah
        # buildah-action handles the rootless container build.
        # We avoid docker/build-push-action because the GH-hosted
        # runner has no Docker daemon and docker buildx setup adds
        # 30+ seconds per job. We disable buildah-action's own
        # push (push: false) because its default credentials are
        # bound to the runner's repo (ciotlosm/gtfs-publisher),
        # not the n3ary org - the explicit "Push with GHCR_TOKEN"
        # step below uses GHCR_TOKEN to land the image at
        # ghcr.io/n3ary/gtfs-rt.
        uses: containers/buildah-action@v2
        with:
          containerfiles: apps/gtfs-rt/Containerfile
          context: .
          # Multi-arch keeps arm64-ready images around for future
          # Hetzner CAX instances; the live VM is amd64 so this is
          # a forward-looking choice, not a current requirement.
          platforms: linux/amd64,linux/arm64
          # The builder stage does `pnpm install` against
          # npm.pkg.github.com, which needs the @n3ary auth token.
          # Buildah's secrets= forwards the secret into the
          # build-time /run/secrets/npm_token mount.
          secrets: 'npm_token=${{ secrets.NPM_TOKEN }}'
          # Don't push from this step - the org-scoped push
          # happens in the next step using GHCR_TOKEN, which
          # is what we need to land the image at ghcr.io/n3ary/
          # rather than at the runner's default repo.
          push: false
          # Tag the local containers-storage image. Wrapped in
          # single quotes so YAML does not interpret the trailing
          # `}}` as a flow mapping close (which would confuse the
          # GH Actions expression parser downstream).
          tags: 'ghcr.io/n3ary/gtfs-rt:sha-${{ github.sha | truncate(12, end="") }}'
      - name: Push with GHCR_TOKEN
        # The buildah-action step built the image into local
        # containers-storage. We push from there to ghcr.io using
        # GHCR_TOKEN, which is org-scoped (packages:write on n3ary)
        # rather than the runner's default GITHUB_TOKEN (which is
        # bound to the runner's repo, not the n3ary org).
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::12}"
          for tag in "sha-${SHORT_SHA}" "latest"; do
            echo "pushing ghcr.io/n3ary/gtfs-rt:${tag}"
            buildah tag \
              "containers-storage:ghcr.io/n3ary/gtfs-rt:sha-${SHORT_SHA}" \
              "containers-storage:ghcr.io/n3ary/gtfs-rt:${tag}"
            buildah push \
              --creds "ciotlosm:${GHCR_TOKEN}" \
              "containers-storage:ghcr.io/n3ary/gtfs-rt:${tag}" \
              "docker://ghcr.io/n3ary/gtfs-rt:${tag}"
          done
      - name: Summarise
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "## gtfs-rt build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- tags pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "  - \`ghcr.io/n3ary/gtfs-rt:sha-${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "  - \`ghcr.io/n3ary/gtfs-rt:latest\`" >> "$GITHUB_STEP_SUMMARY"