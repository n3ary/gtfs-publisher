name: "Build GTFS: CTP Cluj (agency 2)"

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for creating releases

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GTFS for agency 2
        run: node src/build.js --agency 2

      - name: Compare hash with latest release
        id: check
        run: |
          # Read the hash we just generated
          NEW_HASH=$(cat output/agency-2/HASH)
          echo "New hash: $NEW_HASH"

          # Get the latest tag for this agency, then fetch its body for the hash
          LATEST_TAG=$(gh release list --limit 10 --json tagName \
            --jq '[.[] | select(.tagName | startswith("agency-2-"))][0].tagName' 2>/dev/null || echo "")

          PREV_HASH=""
          if [ -n "$LATEST_TAG" ]; then
            PREV_HASH=$(gh release view "$LATEST_TAG" --json body --jq '.body' 2>/dev/null \
              | grep -oE 'hash: [a-f0-9]{64}' | cut -d' ' -f2 || echo "")
          fi

          echo "Latest tag: ${LATEST_TAG:-none}"
          echo "Previous hash: ${PREV_HASH:-none}"

          if [ "$NEW_HASH" = "$PREV_HASH" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No schedule changes — skipping release"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schedule changed — publishing new release"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: steps.check.outputs.changed == 'true'
        run: |
          TAG="agency-2-$(date -u +%Y%m%d)"
          HASH=$(cat output/agency-2/HASH)
          DATE=$(date -u +%Y-%m-%d)

          # Delete existing tag for today if re-running (idempotent)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            output/agency-2/agency-2-gtfs.zip \
            output/agency-2/agency-2-schedule.json \
            --title "CTP Cluj GTFS — $DATE" \
            --notes "Daily GTFS build for CTP Cluj-Napoca (agency 2).

          hash: $HASH
          generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          trips: $(grep -c '' output/agency-2/trips.txt)
          stop_times: $(grep -c '' output/agency-2/stop_times.txt)

          Assets:
          - agency-2-gtfs.zip: raw GTFS (for validation/interop)
          - agency-2-schedule.json: compact payload (consumed directly by neary app)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to releases branch
        if: steps.check.outputs.changed == 'true'
        run: |
          HASH=$(cat output/agency-2/HASH)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Create the manifest
          cat > /tmp/manifest.json << EOF
          {
            "agency-2": {
              "name": "CTP Cluj-Napoca",
              "version": "$DATE",
              "hash": "$HASH",
              "files": {
                "schedule": "agency-2-schedule.json",
                "gtfs": "agency-2-gtfs.zip"
              }
            }
          }
          EOF

          # Clone just the releases branch (orphan, shallow)
          git clone --single-branch --branch releases --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            /tmp/releases-branch

          # Copy updated files
          cp output/agency-2/agency-2-schedule.json /tmp/releases-branch/
          cp output/agency-2/agency-2-gtfs.zip /tmp/releases-branch/
          cp /tmp/manifest.json /tmp/releases-branch/manifest.json

          # Commit and push
          cd /tmp/releases-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: agency 2 schedule ($DATE)" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
